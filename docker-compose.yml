services:
  db:
    image: postgres:16-alpine
    container_name: starter-db
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: starter
      POSTGRES_PASSWORD: starter_dev
      POSTGRES_DB: starter
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U starter']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: starter-redis
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
